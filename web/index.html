<!DOCTYPE html>
<html>

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">

  <!-- ======================================================
    PERSONALISE: Update the description below to describe you.
  ======================================================= -->
  <meta name="description" content="Your Name — your one-line bio here.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <!-- PERSONALISE: Update this to your name or site name -->
  <meta name="apple-mobile-web-app-title" content="My Portfolio">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Open Graph — controls how your site looks when shared on social media.
       PERSONALISE: Update all og: values below. -->
  <meta property="og:title" content="Your Name — Portfolio" />
  <meta property="og:description" content="Your one-line bio here." />
  <!-- PERSONALISE: Replace with the URL of your deployed Icon-512.png -->
  <meta property="og:image" content="https://yourdomain.com/icons/Icon-512.png" />
  <!-- PERSONALISE: Replace with your live site URL -->
  <meta property="og:url" content="https://yourdomain.com/" />
  <meta property="og:type" content="website" />

  <!-- Twitter/X card — controls the preview card when shared on X/Twitter.
       PERSONALISE: Update all twitter: values below. -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Your Name — Portfolio" />
  <meta name="twitter:description" content="Your one-line bio here." />
  <!-- PERSONALISE: Replace with your deployed Icon-512.png URL -->
  <meta name="twitter:image" content="https://yourdomain.com/icons/Icon-512.png" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.svg" />

  <!-- PERSONALISE: Update to your name and role -->
  <title>Your Name | Your Role</title>
  <link rel="manifest" href="manifest.json">
</head>

<body>
  <script src="flutter_bootstrap.js" async></script>
</body>

</html>
