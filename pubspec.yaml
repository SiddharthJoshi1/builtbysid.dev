name: bento_template
description: "A Flutter web portfolio template using a bento grid layout. Fork, customise content.json, deploy."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  font_awesome_flutter: ^11.0.0
  get_it: ^9.2.0
  google_fonts: ^8.0.1
  url_launcher: ^6.3.2
  flutter_bloc: ^9.1.0
  shared_preferences: ^2.5.3
  lukehog_client: ^0.4.6
  bento_layout: ^0.2.0
  flutter_map: ^8.1.1
  latlong2: ^0.9.1
  http: ^1.6.0
  video_player: ^2.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/data/
